<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <main class="box quiz-item">
        <h1>Basic HTML and CSS Quiz </h1>
        <form class="box quiz-item">
            <div class="quiz-item">
                <label for="q1">1. what does the acronym css stand for?</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-item">
                <label for="q2">2. How are id and css attributes selected in css?</label>
                <textarea id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-item">
                <label for="q3">3. Which of the following is a valid css comment?</label>
                <select id="q3" name="q3">
                    <option value=""selected disabled>choose one ...</option>
                    <option value="a">A. &lt;/-- This is a comment --&lt;</option>
                    <option value="b">B. /* This is a comment */</option>
                    <option value="c">C. // This is a comment</option>
                </select>
            </div>
            <div class="quiz-item">
                <label for="q4">4. what is the bottom margin giving this declaration?</label>
                <code class="box">margin: 10px 5px 15px</code>
                <input type="number" id="q4" name="q4">
            </div>
            <button type="submit"> Submit Quiz</button>
        </form>
    </main>
    
</body>
</html>
